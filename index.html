<!DOCTYPE html>
<html lang="fr">
<head>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Jost', 'Inter', sans-serif; }
    #root { min-height: 100vh; }

    /* Modale clé API */
    #api-modal {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(28,20,14,0.85); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
    }
    #api-modal.hidden { display: none; }
    #api-modal .box {
      background: #FAF8F5; border-radius: 16px; padding: 32px;
      max-width: 440px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    #api-modal h2 { font-size: 18px; font-weight: 700; color: #1C140E; margin-bottom: 8px; }
    #api-modal p  { font-size: 13px; color: #7C5A3C; margin-bottom: 20px; line-height: 1.6; }
    #api-modal input {
      width: 100%; border: 1.5px solid #F4EEE6; border-radius: 10px;
      padding: 12px 14px; font-size: 14px; color: #1C140E;
      outline: none; transition: border-color .2s;
    }
    #api-modal input:focus { border-color: #5C3317; }
    #api-modal button {
      width: 100%; margin-top: 12px; background: #5C3317; color: #fff;
      border: none; border-radius: 999px; padding: 13px;
      font-size: 14px; font-weight: 700; cursor: pointer; transition: background .2s;
    }

    #api-modal .skip {
      text-align: center; margin-top: 10px; font-size: 12px; color: #7C5A3C; cursor: pointer;
      background: none; width: auto; padding: 0;
    }
    #api-modal .skip:hover { background: none; color: #1C140E; text-decoration: underline; }
  </style>
</head>
<body>

<!-- Saisie de la clé API (vanilla JS, s'exécute avant le chargement de React) -->
<div id="api-modal">
  <div class="box">
    <h2>🔑 Clé API Anthropic</h2>
    <p>
      Les agents IA appellent l'API Anthropic directement depuis le navigateur.
      Saisis ta clé pour activer les agents. Elle ne sera pas stockée.
    </p>
    <input type="password" id="api-key-input" placeholder="sk-ant-…" autocomplete="off" />
    <button id="api-key-confirm">Confirmer</button>
    <button class="skip" id="api-key-skip">Continuer sans agents IA</button>
  </div>
</div>

<div id="root"></div>

<script>
  window.__ANTHROPIC_KEY = "";
  document.getElementById("api-key-confirm").addEventListener("click", function () {
    var val = document.getElementById("api-key-input").value.trim();
    if (val) window.__ANTHROPIC_KEY = val;
    document.getElementById("api-modal").classList.add("hidden");
  });
  document.getElementById("api-key-skip").addEventListener("click", function () {
    document.getElementById("api-modal").classList.add("hidden");
  });
</script>

async function callClaude(prompt) {
  const key = window.__ANTHROPIC_KEY;
  if (!key) return "⚠️ Aucune clé API configurée. Recharge la page et saisis ta clé Anthropic.";
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": key,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true",
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await res.json();
    if (data.error) return `Erreur API : ${data.error.message}`;
    return data.content?.[0]?.text || "Erreur de réponse.";
  } catch (e) {
    return `Erreur réseau : ${e.message}`;
  }
}

function Spinner() {

  );
}

function AgentCard({ agent, onRun }) {

    setResult(null);

    setLoading(false);
  };

    <div style={{
      background: "white", borderRadius: 12, padding: 20,

        </div>

          disabled={loading}
          style={{

            color: loading ? MOCHA : "white",
            border: "none", borderRadius: 999, padding: "8px 18px",

        >

          whiteSpace: "pre-wrap", maxHeight: 320, overflowY: "auto"

        </div>
      )}
    </div>
  );
}

                  }}>
                    <span style={{ fontSize: 16 }}>✅</span>
                    <span style={{ fontSize: 14, color: "#276749", textDecoration: "line-through", opacity: 0.7 }}>
                      {todo.task}
                    </span>
                  </div>
                ))}
              </div>
            </div>

            {/* Score boutique */}
            <div style={{
              background: `linear-gradient(135deg, ${ESPRESSO_DARK}, ${ESPRESSO})`,
              borderRadius: 12, padding: 20, color: CREAM
            }}>
              <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 12 }}>🏆 Score boutique SvelteShape</div>
              {[
                { label: "Design & Branding",   score: 95 },
                { label: "SEO Technique",        score: 80 },
                { label: "Conversion (CRO)",     score: 65 },
                { label: "Trafic",               score: 45 },
                { label: "Social Proof",         score: 30 },
              ].map((item, i) => (
                <div key={i} style={{ marginBottom: 10 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4, fontSize: 12 }}>
                    <span>{item.label}</span>
                    <span style={{ color: GOLD, fontWeight: 700 }}>{item.score}%</span>
                  </div>
                  <div style={{ background: "rgba(255,255,255,0.1)", borderRadius: 999, height: 6 }}>
                    <div style={{
                      background: `linear-gradient(to right, ${GOLD}, #E8A84C)`,
                      height: "100%", borderRadius: 999,
                      width: `${item.score}%`, transition: "width 1s ease"
                    }} />
                  </div>
                </div>
              ))}
            </div>

          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
